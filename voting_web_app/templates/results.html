
<!DOCTYPE html>
<html>
<head>
    <title>Election Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .winner { background-color: #d1e7dd !important; color: #0f5132; border-left: 10px solid #198754; }
        .loser { background-color: #f8f9fa !important; color: #6c757d; border-left: 10px solid #343a40; opacity: 0.8; }
        .result-card { border-radius: 15px; transition: 0.3s; }
    </style>
</head>
<body class="bg-white">
    <div class="container mt-5">
        <h1 class="text-center mb-5">Final Election Results 🏆</h1>
        <div class="row justify-content-center">
            <div class="col-md-8">
                {% for c in candidates %}
                <div class="card mb-3 result-card shadow-sm {% if loop.first %}winner{% else %}loser{% endif %}">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center">
                            <span class="h2 me-4">#{{ loop.index }}</span>
                            <div>
                                <h3 class="mb-0">{{ c.name }}</h3>
                                <small>Candidate ID: {{ c.id }}</small>
                            </div>
                        </div>
                        <div class="text-end">
                            <h2 class="mb-0">{{ c.votes }}</h2>
                            <p class="mb-0">Total Votes</p>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
        <div class="text-center mt-4">
            <a href="/logout" class="btn btn-secondary">Back to Login</a>
        </div>
    </div>
</body>
</html>
