

<!DOCTYPE html>
<html>
<head>
    <title>Cast Your Vote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container"><span class="navbar-brand">Digital EVM System</span><a href="/logout" class="btn btn-outline-light btn-sm">Logout</a></div>
    </nav>
    <div class="container">
        <h2 class="mb-4">Select Your Candidate</h2>
        <div class="row">
            {% for c in candidates %}
            <div class="col-md-12 mb-3">
                <div class="card shadow-sm">
                    <div class="card-body d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-center">
                            <img src="/static/images/{{ c.symbol }}" width="60" class="me-3">
                            <h4 class="mb-0">{{ c.name }}</h4>
                        </div>
                        <a href="/vote/{{ c.id }}" class="btn btn-primary btn-lg px-5" style="border-radius: 50px;">VOTE</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
